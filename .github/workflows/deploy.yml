name: Deploy to EC2

on:
  push:
    branches: [ deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          envs: DB_URL,DB_USERNAME,DB_PASSWORD
          script: |
            cd /home/ubuntu/38-COLLABORATION-SERVER-LINKAREER
            git checkout -- .
            git pull origin deploy --no-rebase
            ./gradlew bootJar -x test
            sudo fuser -k 8080/tcp || true
            nohup java -Dfile.encoding=UTF-8 \
              -DDB_URL=$DB_URL \
              -DDB_USERNAME=$DB_USERNAME \
              -DDB_PASSWORD=$DB_PASSWORD \
              -jar build/libs/sopt-linkareer-0.0.1-SNAPSHOT.jar > /home/ubuntu/app.log 2>&1 &
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
